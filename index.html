<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C262F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F8F9FA" media="(prefers-color-scheme: light)" />
    <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:; default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>HYPR° Report Center</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />
    <style>
      /* Reset mínimo. NÃO usar `* { margin: 0; padding: 0 }` aqui —
       * por estar unlayered no <style> inline, vence todas as utilities
       * do Tailwind v4 (que vivem em @layer utilities), quebrando
       * mx-auto, space-y-*, p-*, gap-*. Tailwind preflight já zera
       * margins de elementos relevantes (body, headings, p, etc) e
       * aplica box-sizing border-box em *. Quem precisar de padding/
       * margin = 0 explícito usa as utilities `m-0` / `p-0`.
       *
       * `display: flex` em html/body/#root também foi removido — em
       * flex column, `margin: auto` em filho direto se comporta
       * diferente de block layout, e Legacy/V2 não dependiam disso
       * pra layout (ambos tratam dimensões nos seus próprios
       * containers). width:100% + min-height:100vh é suficiente pra
       * garantir que #root preencha a viewport. */
      html, body, #root { width: 100%; min-height: 100vh; }
      body { overflow-x: hidden; margin: 0; }
      /* Fundo no <html> desde o primeiro paint — sem ele, o branco default
       * do navegador (+ margin default do body) vaza como borda no topo/
       * esquerda até o React pintar o canvas, visível ao abrir link de
       * report em aba nova. O data-theme já foi aplicado pelo script
       * anti-FOUC (síncrono no <head>, antes do primeiro paint).
       * Cores = --color-canvas de src/ui/theme.css (sync manual). */
      html { background: #F8F9FA; }
      html[data-theme="dark"] { background: #1C262F; }
      /* Spinner estático pré-React (o primeiro render substitui o #root).
       * Mesmo visual do <Spinner/> (src/components/Spinner.jsx) e do
       * fallback do RouteSuspense — a transição fica contínua. */
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      #boot-loader { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      #boot-loader .boot-ring {
        width: 36px; height: 36px; border-radius: 50%;
        border: 2px solid rgba(51, 151, 185, 0.19);
        border-top-color: #3397B9;
        animation: boot-spin 0.8s linear infinite;
      }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GL9LXQVMT4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GL9LXQVMT4', { send_page_view: false });
    </script>

    <!-- Anti-FOUC: aplica data-theme no <html> ANTES do React montar.
         Sem isso, primeiro render usa default dark mesmo se user salvou
         light no localStorage, causando flash visual. Lógica idêntica
         ao getInitialTheme em src/v2/hooks/useTheme.js (mantida em
         sync manual — set raríssimo, vale a duplicação pra evitar
         dependência de bundle JS no path crítico). -->
    <script>
      // HYPR é dark-first — sem toggle explícito, sempre default dark.
      // (Antes seguíamos prefers-color-scheme do OS, mas isso causava
      // drawer/modais pintando light enquanto componentes legacy
      // hardcoded permaneciam dark — inconsistência visual feia.)
      (function(){
        try {
          var stored = localStorage.getItem('hypr_theme');
          if (stored === 'dark' || stored === 'light') {
            document.documentElement.setAttribute('data-theme', stored);
            return;
          }
        } catch(e) {}
        document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-loader"><div class="boot-ring"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
